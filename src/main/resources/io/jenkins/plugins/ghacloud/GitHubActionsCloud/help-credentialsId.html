<div>
    A <strong>Secret Text</strong> credential containing a GitHub Personal Access Token (PAT).
    <p>
    The token must have the <code>actions:write</code> scope (for classic PATs) or
    <strong>Actions: Read and write</strong> permission (for fine-grained PATs) on the target repository,
    so the plugin can trigger workflow dispatches and check run status.
    </p>
</div>
