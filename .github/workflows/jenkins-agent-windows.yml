# ---------------------------------------------------------------
# Sample GitHub Actions workflow for Jenkins agent provisioning
# (Windows)
# ---------------------------------------------------------------
# Place this file in your GitHub repository at:
#   .github/workflows/jenkins-agent-windows.yml
#
# The GitHub Actions Cloud plugin triggers this workflow via
# workflow_dispatch, passing the Jenkins URL, agent name, and
# agent secret as inputs.
# ---------------------------------------------------------------

name: Jenkins Agent (Windows)

on:
  workflow_dispatch:
    inputs:
      jenkins_url:
        description: 'Jenkins server URL (with trailing slash)'
        required: true
      agent_name:
        description: 'Jenkins agent name'
        required: true
      agent_secret:
        description: 'Jenkins agent secret'
        required: true

jobs:
  agent:
    runs-on: windows-latest
    timeout-minutes: 360   # max 6 hours, adjust as needed

    steps:
      - name: Mask secret
        shell: bash
        run: |
          secret=$(jq -r '.inputs.agent_secret' "$GITHUB_EVENT_PATH")
          echo "::add-mask::$secret"

      - name: Download Jenkins agent JAR
        run: |
          Invoke-WebRequest -Uri "${{ inputs.jenkins_url }}jnlpJars/agent.jar" `
            -OutFile agent.jar -MaximumRetryCount 3 -RetryIntervalSec 5

      - name: Connect to Jenkins
        env:
          AGENT_SECRET: ${{ inputs.agent_secret }}
        run: |
          & "$env:JAVA_HOME_21_X64\bin\java" -jar agent.jar `
            -url "${{ inputs.jenkins_url }}" `
            -secret "$env:AGENT_SECRET" `
            -name "${{ inputs.agent_name }}" `
            -workDir "C:\agent" `
            -webSocket `
            -noReconnect
