<div>
    The GitHub repository that contains the workflow file to trigger, in <code>owner/repo</code> format.
    <p>
    For example: <code>my-org/ci-runners</code>
    </p>
    <p>
    The repository must contain a workflow file (in <code>.github/workflows/</code>) that accepts
    <code>jenkins_url</code>, <code>agent_name</code>, and <code>agent_secret</code> as
    <code>workflow_dispatch</code> inputs.
    </p>
</div>
