<div>
    The working directory on the GitHub Actions runner where the Jenkins agent stores files.
    <p>
    This should match the <code>-workDir</code> argument in your workflow file.
    Defaults to <code>/home/runner/agent</code>, which works for GitHub-hosted Linux runners.
    For Windows runners, use a path like <code>C:\actions-runner\agent</code>.
    </p>
</div>
